  #   # For NVIDIA GPUs, uncomment:
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      # - proxy
      - intranet
    ports:
      - 80:80
      - 443:443
    environment:
      - CF_API_EMAIL=${CF_API_EMAIL}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    command:
      - "--log.level=DEBUG"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls.certResolver=cloudflare"
      - "--certificatesresolvers.cloudflare.acme.storage=acme.json"
      - "--certificatesResolvers.cloudflare.acme.email=alban.andrieu@free.fr"
      - "--certificatesResolvers.cloudflare.acme.dnsChallenge=true"
      - "--certificatesResolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
      - "--certificatesResolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,1.0.0.1:53"
      - "--serversTransport.insecureSkipVerify=true" # Or proxmox gives an error 500 due to its own self-signed cert

    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/acme.json:/acme.json

# PostgreSQL: only pgwatch/docker/compose.postgres.yml defines the `postgres` service for this
# project. Do not add another `postgres` service in included fragments; use depends_on / env only.
include:
  - path: pgwatch/docker/compose.postgres.yml
  # - path: pgwatch/docker/compose.pgpool.yml
  - path: pgwatch/docker/compose.pgbouncer.yml
  # - path: pgwatch/docker/compose.pgwatch.yml
  # - path: pgwatch/docker/compose.pgadmin.yml
  - path: compose.redis.yml
  - path: compose.clickhouse.yml
  - path: compose.ntopng.yml
  - path: compose.monitoring.yml # Prometheus + Grafana
  - path: compose.tool.yml
  # - path: compose.prowler.yml # TODO, consuming too much ressources
  - path: compose.security.yml
  # - path: compose.truenas.yml #nosec allow:gitleaks
  # - path: anything-llm/docker/docker-compose.yml
  # - path: sentry/docker-compose.yml  
  - path: plumber-platform/compose.local.yml # port 3001 with anythingllm conflict
  # - path: n8n/docker-compose/withPostgresAndWorker/docker-compose.yml
  # - path: temporal/compose-services.yml
  # - path: openvas/docker-compose-openvas.yml
  # - path: compose.fixinventory.yaml

