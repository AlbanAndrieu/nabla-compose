---
# Production-oriented overrides. Use as a second file (include cannot merge these into other
# included services): docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# The default stack already maps AnythingLLM to host port 3007 in docker-compose.yml (root
# services); this file repeats that mapping so a prod-only CLI merge stays consistent.
services:
  # Merges into the `postgres` service from pgwatch/docker/compose.postgres.yml (same container).
  postgres:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G

  redis:
    restart: always
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  anything-llm:
    ports:
      - "${ANYTHINGLLM_PORT:-3007}:3001"
