---
configs:
  users.yml:
    content: |
      users:
        admin:
          name: "Admin"
          password: "${DOZZLE_ADMIN_PASSWORD_BCRYPTED}"

services:
  dozzle:
    container_name: dozzle
    image: amir20/dozzle:v10.6.3 # amir20/dozzle:latest
    restart: unless-stopped
    ports:
      - "8888:8080"
    # onfigs:
    # - source: users.yml
    #   target: /mnt/cpool/dozzle/users.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/cpool/dozzle/data:/data
    env_file:
      - /mnt/cpool/dozzle/.env
      - /mnt/cpool/dozzle/.env.secrets
    environment:
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_AUTH_PROVIDER=simple
      - DOZZLE_ENABLE_ACTIONS=true
      - DOZZLE_ENABLE_SHELL=true
      - DOZZLE_ENABLE_MCP=true # https://dozzle.dev/guide/mcp
      - DOZZLE_REMOTE_AGENT=172.17.0.57:7007
      - DOZZLE_HOSTNAME=dozzle.albandrieu.com
    security_opt:
      - no-new-privileges:true
    networks: ["traefik_network"]
    labels:
      - "traefik.enable=true"
      # - "traefik.http.routers.dozzle.rule=Host(`dozzle.nas.svc.h.albandrieu.com`)"
      - "traefik.http.routers.dozzle.rule=Host(`dozzle.albandrieu.com`)"
      - "traefik.http.routers.dozzle.entrypoints=websecure"
      - "traefik.http.routers.dozzle.tls.certresolver=cloudflare"
      - "traefik.http.routers.dozzle.service=dozzle"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8888"

networks:
  traefik_network:
    external: true
