---
services:
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    env_file:
      - /mnt/cpool/ollama/.env
    #  - /mnt/cpool/ollama/.env.secrets
    environment:
      - TZ=Europe/Paris
      - OLLAMA_HOST=0.0.0.0:30068
      - OLLAMA_KEEP_ALIVE=72h
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_MAX_QUEUE=4
      # - CUDA_VISIBLE_DEVICES="" # force CPU, no GPU
      - OLLAMA_CONTEXT_LENGTH=4096 # 32768 too big for RTX 2060
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_MODELS=/mnt/cpool/model/ollama/
      - OLLAMA_GPU_OVERHEAD=268435456
      - OLLAMA_KV_CACHE_TYPE=q8_0
      # - OLLAMA_API_KEY=${OLLAMA_API_KEY} # <-- Place your API key in .env or .env.secrets.
    # --- Healthcheck (enable manually, see OLLAMA docs for readiness path)
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:30068/health" ]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5
    #   start_period: 20s
    volumes:
      - /mnt/cpool/ollama/:/root/.ollama
      - /mnt/cpool/model/ollama/:/mnt/cpool/model/ollama/
    ports:
      - 30068:30068
