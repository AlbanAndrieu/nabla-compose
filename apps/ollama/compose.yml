    #   - "traefik.http.routers.ollama.service=ollama"
    #   - "traefik.http.services.ollama.loadbalancer.server.scheme=http"
    #   - autoxpose.enable=true
    #   - autoxpose.subdomain=ollama
    #   - autoxpose.port=30068
    #   - autoxpose.domain=ollama.albandrieu.com
    #   - autoxpose.scheme=http
