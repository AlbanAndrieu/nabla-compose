---
services:
  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:25.8 # clickhouse 26.x has issue with langfuse keep using 25.8
    restart: unless-stopped
    user: "568:568" # TrueNAS apps user
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse} # CHANGEME
    volumes:
      - /mnt/cpool/clickhouse/:/var/lib/clickhouse
      # - /mnt/cpool/clickhouse/logs:/var/log/clickhouse-server
      - /mnt/cpool/logs/clickhouse-server/:/var/log/clickhouse-server
    ports:
      - 8123:8123
      - 9000:9000
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  clickhouse_exporter:
    image: altinity/clickhouse-exporter:latest
    container_name: clickhouse_exporter
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_URL: http://clickhouse:8123/
    ports:
      - 9116:9116
    networks:
      - default
