# Minio alert rules (from awesome-prometheus-alerts)
groups:
- name: Minio
  rules:
    - alert: MinioClusterDiskOffline
      expr: minio_cluster_drive_offline_total > 0
      for: 0m
      labels: {severity: critical}
      annotations:
        summary: Minio cluster disk offline
        description: "A Minio cluster disk is offline."
# ... (add more Minio rules from awesome-prometheus-alerts)
