---
services:
  minio:
    image: cgr.dev/chainguard/minio
    container_name: minio
    restart: unless-stopped
    # user: "568:568" # TrueNAS apps user    
    user: "473:473" # TrueNAS minio user
    entrypoint: sh    
    # create the 'langfuse' bucket before starting the service
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret} # CHANGEME
      HOME: /tmp
    ports:
      # S3 API, pour Langfuse
      - "9002:9000"
      # Console admin
      - "9091:9001"
    volumes:
      - /mnt/cpool/minio:/data
      # - langfuse_minio_data:/export
    healthcheck:
      # test: ["CMD", "mc", "ready", "local"]
      test: ["CMD-SHELL", "mc alias set local http://127.0.0.1:9000 \"$MINIO_ROOT_USER\" \"$MINIO_ROOT_PASSWORD\" >/dev/null 2>&1 && mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  #langfuse_minio_data:
  #  driver: local