---
services:
  traefik:
    image: docker.io/traefik:v3.7.0
    container_name: traefik
    restart: unless-stopped
    env_file:
      - /mnt/cpool/traefik/.env
      - /mnt/cpool/traefik/.env.secrets
    environment:
      - TZ=Europe/Paris 
    security_opt:
      - no-new-privileges:true

    command:
      # - "--configfile="

      # API / Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=true"

      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--serversTransport.insecureSkipVerify=true" # Or proxmox gives an error 500 due to its own self-signed cert

      #  - "--entrypoints.websecure.http.tls.certResolver=cloudflare"
      - "--entrypoints.websecure.http.tls.certresolver=letsencrypt"
      - "--entrypoints.websecure.http.tls.domains[0].main=int.albandrieu.com" # local.albandrieu.com
      - "--entrypoints.websecure.http.tls.domains[0].sans=*.int.albandrieu.com" # *.local.albandrieu.com
      # - "--providers.file.filename=/etc/traefik/routes.yml"

      - "--providers.file.watch=true"

      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik_network"

      # Let's Encrypt / Cloudflare DNS
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/certs/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"

      # - "--certificatesresolvers.cloudflare.acme.email=alban.andrieu@free.fr"
      # # - "--certificatesresolvers.cloudflare.acme.storage=/acme.json"
      # - "--certificatesresolvers.cloudflare.acme.storage=/etc/traefik/certs/acme.json"
      # - "--certificatesresolvers.cloudflare.acme.dnschallenge=true"
      # - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
      # - "--certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,1.0.0.1:53"
      # - "--certificatesresolvers.cloudflare.acme.dnschallenge.delaybeforecheck=30"
      # # - "--certificatesresolvers.cloudflare.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"

      # Logging
      # - "--log.level=INFO"
      - "--log.level=DEBUG"
      - "--accesslog=true"
      - "--accesslog.bufferingsize=100"

      # Metrics
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addentrypointslabels=true"
      - "--metrics.prometheus.addserviceslabels=true"

    ports:
      - "80:80" # Traefik 
      - "443:443" # Traefik    
      - "8080:8080"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/localtime:/etc/localtime:ro
      - /mnt/cpool/traefik/:/etc/traefik/  
      # NOK - /mnt/cpool/traefik/routes.yml:/etc/traefik/routes.yml:ro     

    networks: ["traefik_network"]
    labels:
      # - "traefik.enable=true"
      # - "traefik.http.routers.traefik.rule=Host(`traefik.albandrieu.com`)"
      # - "traefik.http.routers.traefik.entrypoints=websecure"
      # - "traefik.http.routers.traefik.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal" # This "api@internal" is to access the dashboard
      # NOK - "traefik.http.routers.traefik.middlewares=traefik-auth"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_BASIC_AUTH}"

  pihole-dns-sync:
    image: ghcr.io/cajuclc/traefik-pihole-sync:v0.0.1
    container_name: pihole-dns-sync
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/cpool/traefik/:/etc/traefik/
      # - /mnt/cpool/traefik/external-services.yml:/etc/traefik/external-services.yml:ro
      # - /mnt/cpool/traefik/routes.yml:/etc/traefik/routes.yml
    env_file:
      - /mnt/cpool/traefik/.env.secrets
    environment:
      PIHOLE_URL: http://172.17.0.24:20720
      SKIP_TLS_VERIFY: "true"
      TARGET_IP: 172.17.0.24
      # DOMAIN_SUFFIX: local.albandrieu.com
      DOMAIN_SUFFIX: int.albandrieu.com
      EXTERNAL_SERVICES_FILE: /etc/traefik/external-services.yml
      OUTPUT_FILE: /etc/traefik/routes.yml

  ddns-updater:
    image: ghcr.io/qdm12/ddns-updater
    container_name: ddns-updater
    restart: unless-stopped    
    network_mode: bridge
    ports:
      - 8000:8000/tcp
    volumes:
      - /mnt/cpool/traefik/ddns:/updater/data
    env_file:
      - /mnt/cpool/traefik/.env.secrets      
    environment:
      - CONFIG=
      - PERIOD=5m
      - UPDATE_COOLDOWN_PERIOD=5m
      - PUBLICIP_FETCHERS=all
      - PUBLICIP_HTTP_PROVIDERS=all
      - PUBLICIPV4_HTTP_PROVIDERS=all
      - PUBLICIPV6_HTTP_PROVIDERS=all
      - PUBLICIP_DNS_PROVIDERS=all
      - PUBLICIP_DNS_TIMEOUT=3s
      - HTTP_TIMEOUT=10s

      # Web UI
      - LISTENING_ADDRESS=:8000
      - ROOT_URL=/

      # Backup
      - BACKUP_PERIOD=0 # 0 to disable
      - BACKUP_DIRECTORY=/updater/data

      # Other
      - LOG_LEVEL=info
      - LOG_CALLER=hidden
      - SHOUTRRR_ADDRESSES=

  cloudflare-ddns:
    image: favonia/cloudflare-ddns:1
    # Prefer "1" or "1.x.y" in production.
    #
    # - "1" tracks the latest stable release whose major version is 1
    # - "1.x.y" pins one specific stable version
    # - "latest" moves to each new stable release and may pick up breaking
    #   changes in a future major release, so it is not recommended in production
    # - "edge" tracks the latest unreleased development build
    network_mode: host
    # Optional. This bypasses network isolation and makes IPv6 easier.
    # See "Use IPv6 without sharing the host network".
    restart: always
    # Restart the updater after reboot
    # user: "1000:1000"
    # Run the updater with specific user and group IDs (in that order).
    # You can change the two numbers based on your need.
    read_only: true
    # Make the container filesystem read-only (optional but recommended)
    cap_drop: [all]
    # Drop all Linux capabilities (optional but recommended)
    security_opt: [no-new-privileges:true]
    # Another protection to restrict superuser privileges (optional but recommended)
    env_file:
      - /mnt/cpool/traefik/.env.secrets    
    environment:
      # - CLOUDFLARE_API_TOKEN=cfat_XXX
        # Your Cloudflare API token
      - DOMAINS=toto.albandrieu.com,www.toto.albandrieu.com
        # Your domains (separated by commas)
      - PROXIED=false
        # Leaning toward using Cloudflare's proxy for these domains (optional)
        # Existing DNS records in Cloudflare keep their current proxy statuses

  # ddns:
  #   image: timothyjmiller/cloudflare-ddns:latest
  #   container_name: ddns
  #   restart: unless-stopped    
  #   # network_mode: 'host'
  #   environment:
  #     - PUID=1000
  #     - PGID=1000
  #   volumes:
  #     - /mnt/cpool/traefik/config.ddns.json:/config.json:ro

  dnsupdater:
    # image: yfrickx/traefik-cloudflare-updater:latest
    image: ghcr.io/tiredofit/docker-traefik-cloudflare-companion:latest
    container_name: dnsupdater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:    
      - /mnt/cpool/traefik/.env.secrets
    environment:
      - TARGET_DOMAIN=albandrieu.com
      - DOMAIN1=albandrieu.com
      # - DOMAIN1_ZONE_ID=015XXX
      - DOMAIN2=albanandrieu.com
      # - DOMAIN2_ZONE_ID=227XXX
      - EXCLUDED_DOMAINS=static.albandrieu.com,test.albanandrieu.com

  # traeflare:
  #   image: ghcr.io/m4tt72/traeflare:main
  #   container_name: traeflare
  #   env_file:    
  #     - /mnt/cpool/traefik/.env.secrets
  #   environment:
  #     - TRAEFIK_API_URL=http://172.17.0.24:8080
  #     - PROXIED=false
  #     - DOMAIN_NAME=albandrieu.com
  #   restart: unless-stopped
  #   depends_on:
  #     - traefik

networks:
  traefik_network:
    name: traefik_network
    # driver: bridge
    external: true
  ix-dozzle_default: 
    external: true 

volumes:
  acme: {}
