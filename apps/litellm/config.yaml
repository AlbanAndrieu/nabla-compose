  - model_name: deepseek-coder-v2
    litellm_params:
      model: "ollama/deepseek-coder-v2:16b-lite-base-q2_K"
      api_base: "http://172.17.0.24:30068"
      request_timeout: 300
      num_ctx: 2048

  # - model_name: qwen
  #   litellm_params:
