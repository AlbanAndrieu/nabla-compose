-   repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
    -   id: yamllint
        name: "📜 yamllint - Lint Yaml"
        args: [--format, parsable, --strict]
        exclude: >
          (?x)^(
            .pnp.cjs|
            package-lock.json|
            bababou-app/package-lock.json|
            npm-shrinkwrap.json|
            poetry.lock|
            Pipfile.lock|
            yarn.lock|
            sbom.json|
            pnpm-lock.yaml|
          )$

