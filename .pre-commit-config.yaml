    #             README.md|
    #         )$

    ### Javascript & Web Tools ###
-   repo: https://github.com/biomejs/pre-commit
    rev: "v2.5.1"
    hooks:
    -   id: biome-check
        name: "🟨 javascript · Lint, format, and safe fixes with Biome"
        additional_dependencies: ["@biomejs/biome@1.9.4"]
        exclude: >
          (?x)^(
              trivy-sbom.json|
              my-app/public/.*|
              public/assets/fontawesome-free-7.1.0-web/.*|
              public/assets/fontawesome/.*|
              public/assets/.*|
              public/arf.js|
              public/index.js|
              public/d3.v3.min.js|
              api/hello.js|
          )$

-   repo: https://github.com/Lucas-C/pre-commit-hooks-nodejs
    rev: v1.1.2
    hooks:
    -   id: htmllint
        name: "📝 html · Lint html"
        args: [--config, .eslintrc.json]
        files: ^src/
    -   id: htmlhint
        name: "📝 html · Hint html"
        args: [--config, .htmlhintrc]
        exclude: >
          (?x)^(
            public/reports/.*|
          )$
    -   id: markdown-toc
        name: "📝 markdown · Toc markdown"
        args: [--maxdepth, "3", -i]

    ### PNG Images ###
    # - repo: https://github.com/shssoichiro/oxipng
    #   rev: v9.1.5
    #   hooks:
    #     - id: oxipng
    #       name: "🖼️ images · Optimize PNG files"
    #       args: ["-o", "4", "--strip", "safe", "--alpha"]

    ### Additional File Types ###
-   repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
    -   id: prettier
        name: "✨ misc-files · Format misc web files"
        types_or: [yaml, html, scss]
        additional_dependencies:
        -   prettier@3.4.2
        exclude: >
          (?x)^(
            trivy-sbom.json|
            my-app/public/.*|
            pnpm-lock.yaml|
            public/login.html|
            public/cv/index.html|
            public/reports/.*|
            api/honeypot/.*|
            public/assets/fontawesome-free-7.1.0-web/.*|
            public/assets/fontawesome/.*|
            .pre-commit-config.yaml|
          )$

    ### Data & Config Validation ###
-   repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
    -   id: check-github-workflows
        name: "🧩 github-actions · Validate gh workflow files"
        args: ["--verbose"]
    -   id: check-taskfile
        name: "✅ taskfile · Validate Task configuration"

    # ----------------------------- 🔒 Deployment Tools ---------------------------- #
-   repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
    -   id: hadolint-docker
        name: "🐳 hadolint · Validate Dockerfile"

-   repo: https://github.com/gruntwork-io/pre-commit
    rev: v0.1.30
    hooks:
    -   id: helmlint
        name: "☸️ helmlint · Validate Helm Charts"
    # -   repo: https://github.com/norwoodj/helm-docs
    #     rev: '19.0614'
    #     hooks:
    #     -   id: helm-docs
    #         args:
    #         -   --chart-search-root=charts/helm-sample/charts
    #         files: (README\.md\.gotmpl|(Chart|requirements|values)\.yaml)$
    #         name: "☸️ helm docs · Generate Helm Charts documentation"

    # ----------------------------- 🔒 Security Tools ---------------------------- #

-   repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
    -   id: bandit
        name: "🔒 security · Detect security issues"
        args: [-c, .bandit.yml]
        exclude: >
          (?x)^(
            noxfile.py|
            versioneer.py|
            hooks/_version.py|
            hooks/tests/|
            ccds/hook_utils/configure_vcs.py|
            ccds/hook_utils/configure_gh.py|
            ccds/hook_utils/configure_ssh.py|
            ccds/hook_utils/custom_config.py|
          )$

-   repo: https://github.com/IamTheFij/ansible-pre-commit
    rev: v1.0.1
    hooks:
    -   id: encryption-check
        name: "🔒 security · Detect encryption"
        exclude: >
          (?x)^(
            public/assets/fontawesome-free-7.1.0-web/.*|
          )$

-   repo: https://github.com/zricethezav/gitleaks
    rev: v8.30.1
    hooks:
    -   id: gitleaks-docker
        name: "🔒 🐳 security · Detect hardcoded secrets"
        entry: zricethezav/gitleaks protect --verbose --redact --staged

    ### Ansible ###
